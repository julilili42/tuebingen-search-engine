<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tübingen Search — Spotlight</title>
<style>
  /* Inside the transparent desktop window nothing blurs the wallpaper
     behind the page, so the panel is slightly more opaque than real
     Spotlight to keep text readable on any desktop background. */
  :root {
    --panel: rgba(246, 246, 248, 0.88);
    --panel-solid: #f5f5f7;
    --text: #1d1d1f;
    --secondary: #6e6e73;
    --hairline: rgba(0, 0, 0, 0.08);
    --selection: #0a63e1;
    --mark: rgba(255, 214, 102, 0.55);
    --kbd-bg: rgba(0, 0, 0, 0.05);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --panel: rgba(38, 38, 42, 0.84);
      --panel-solid: #2a2a2e;
      --text: #f5f5f7;
      --secondary: #98989d;
      --hairline: rgba(255, 255, 255, 0.1);
      --mark: rgba(255, 214, 102, 0.28);
      --kbd-bg: rgba(255, 255, 255, 0.08);
    }
  }

  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; background: transparent; }
  body {
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: var(--text);
    display: flex; justify-content: center; align-items: flex-start;
    padding: 24px 16px;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }
  /* Browser fallback gets a desktop-like backdrop; inside the frameless
     pywebview window the page stays transparent. */
  body.browser {
    background: radial-gradient(1200px 700px at 30% 20%, #34547e, #131c2b 75%);
    min-height: 100vh; padding-top: 12vh;
  }
  /* Inside the transparent window the shadow must fade out completely
     before it reaches the window edge, otherwise it is clipped into a
     dark box around the panel. */
  body:not(.browser) { padding: 26px 28px 36px; }
  body:not(.browser) #spotlight {
    width: min(680px, calc(100vw - 56px));
    box-shadow: 0 10px 28px rgba(0, 0, 0, 0.30),
                0 1px 3px rgba(0, 0, 0, 0.18),
                inset 0 0.5px 0 rgba(255, 255, 255, 0.25);
  }
  body:not(.browser) #spotlight.wide { width: min(980px, calc(100vw - 56px)); }

  #spotlight {
    width: 680px; max-width: 100%;
    background: var(--panel);
    -webkit-backdrop-filter: blur(50px) saturate(180%);
    backdrop-filter: blur(50px) saturate(180%);
    border: 0.5px solid var(--hairline);
    border-radius: 16px;
    box-shadow: 0 22px 70px 4px rgba(0, 0, 0, 0.45),
                inset 0 0.5px 0 rgba(255, 255, 255, 0.25);
    overflow: hidden;
    transition: width 0.18s ease;
  }
  #spotlight.wide { width: 980px; }

  #inputrow {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px;
  }
  #inputrow svg { width: 22px; height: 22px; color: var(--secondary); flex-shrink: 0; }
  #q {
    flex: 1; border: none; outline: none; background: transparent;
    font: 300 24px/1.3 -apple-system, BlinkMacSystemFont, "SF Pro Display",
          "Helvetica Neue", sans-serif;
    color: var(--text); caret-color: var(--selection);
  }
  #q::placeholder { color: var(--secondary); }
  #hint { font-size: 12px; color: var(--secondary); white-space: nowrap; }

  #body { display: none; border-top: 1px solid var(--hairline); }
  #spotlight.open #body { display: flex; }
  #list { flex: 1 1 45%; min-width: 0; max-height: 460px; overflow-y: auto; padding: 6px; }
  #preview {
    flex: 1 1 55%; border-left: 1px solid var(--hairline);
    padding: 22px 20px; max-height: 460px; overflow-y: auto; display: none;
  }
  #spotlight.wide #preview { display: block; }

  .section {
    font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; color: var(--secondary);
    padding: 8px 12px 4px;
  }
  .row {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: 9px; cursor: default;
  }
  .row.selected { background: var(--selection); }
  .row.selected .title, .row.selected .host { color: #fff; }
  .row .badge {
    width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: #fff;
  }
  .row .texts { min-width: 0; }
  .row .title {
    font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .row .host { font-size: 11.5px; color: var(--secondary);
               white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  #preview .badge {
    width: 56px; height: 56px; border-radius: 14px; font-size: 26px;
    margin-bottom: 12px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; color: #fff;
  }
  #preview h2 { font-size: 18px; font-weight: 600; margin-bottom: 2px; }
  #preview .url {
    font-size: 12px; color: var(--secondary); word-break: break-all;
    margin-bottom: 14px;
  }
  #preview .snippet {
    font-size: 13px; color: var(--text); user-select: text;
    padding-bottom: 14px; border-bottom: 1px solid var(--hairline);
    margin-bottom: 14px;
  }
  mark { background: var(--mark); color: inherit; border-radius: 3px; padding: 0 1px; }

  .scoregrid { display: grid; grid-template-columns: 76px 1fr 40px;
               gap: 6px 10px; align-items: center; margin-bottom: 14px; }
  .scoregrid .label { font-size: 12px; color: var(--secondary); }
  .scoregrid .value { font-size: 12px; color: var(--secondary); text-align: right;
                      font-variant-numeric: tabular-nums; }
  .track { height: 6px; border-radius: 3px; background: var(--kbd-bg); overflow: hidden; }
  .fill { height: 100%; border-radius: 3px; }
  .fill.bm25 { background: #0a84ff; }
  .fill.sem  { background: #bf5af2; }
  .fill.prox { background: #30d158; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .chip {
    font-size: 11.5px; padding: 2px 9px; border-radius: 999px;
    background: var(--kbd-bg); color: var(--text);
  }
  .related { font-size: 13px; }
  .related button {
    display: block; width: 100%; text-align: left; border: none; cursor: pointer;
    background: none; color: var(--selection); padding: 3px 0; font-size: 13px;
  }

  #footer {
    display: none; align-items: center; gap: 14px;
    padding: 7px 14px; border-top: 1px solid var(--hairline);
    font-size: 11.5px; color: var(--secondary);
  }
  #spotlight.open #footer { display: flex; }
  kbd {
    font: 11px -apple-system, sans-serif; background: var(--kbd-bg);
    border-radius: 4px; padding: 1px 5px; margin-right: 3px;
  }
  #empty { padding: 18px; font-size: 13px; color: var(--secondary); text-align: center; }
</style>
</head>
<body>
<div id="spotlight">
  <div id="inputrow">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
         stroke-linecap="round"><circle cx="10.5" cy="10.5" r="7"/>
      <line x1="16" y1="16" x2="21" y2="21"/></svg>
    <input id="q" type="text" placeholder="Tübingen Search"
           autocomplete="off" spellcheck="false" autofocus>
    <span id="hint"></span>
  </div>
  <div id="body">
    <div id="list"></div>
    <div id="preview"></div>
  </div>
  <div id="footer">
    <span><kbd>↑</kbd><kbd>↓</kbd> Navigate</span>
    <span><kbd>↩</kbd> Open</span>
    <span><kbd>esc</kbd> Clear</span>
    <span style="margin-left:auto" id="stats"></span>
  </div>
</div>

<script>
const panel = document.getElementById("spotlight");
const input = document.getElementById("q");
const listEl = document.getElementById("list");
const previewEl = document.getElementById("preview");
const statsEl = document.getElementById("stats");
const hintEl = document.getElementById("hint");

const inDesktopShell = () =>
  new URLSearchParams(location.search).get("shell") === "desktop" ||
  Boolean(window.pywebview);
if (!inDesktopShell()) document.body.classList.add("browser");

let results = [];
let suggestions = [];
let selected = 0;
let debounceTimer = null;
let requestId = 0;

input.addEventListener("input", () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(runSearch, 130);
});

document.addEventListener("keydown", (event) => {
  if (event.key === "ArrowDown") { event.preventDefault(); move(1); }
  else if (event.key === "ArrowUp") { event.preventDefault(); move(-1); }
  else if (event.key === "Enter") { openSelected(); }
  else if (event.key === "Escape") {
    if (input.value) { input.value = ""; clear(); }
    else { window.pywebview?.api?.close(); }
  }
  else if (event.target !== input && event.key.length === 1) { input.focus(); }
});

async function runSearch() {
  const query = input.value.trim();
  if (!query) { clear(); return; }

  const currentRequest = ++requestId;
  const response = await fetch(
    "/api/search?" + new URLSearchParams({ q: query, top_n: "12" })
  );
  if (!response.ok || currentRequest !== requestId) return;

  const data = await response.json();
  results = data.results;
  suggestions = data.suggestions || [];
  selected = 0;
  const parts = [];
  if (data.total_matches) parts.push(`${data.total_matches} documents`);
  if (data.completions?.length)
    parts.push(`completing to: ${data.completions.slice(0, 3).join(", ")}`);
  if (data.expansion_terms?.length)
    parts.push(`expanded: ${data.expansion_terms.slice(0, 4).join(", ")}`);
  statsEl.textContent = parts.join(" · ");
  render();
}

function clear() {
  results = [];
  panel.classList.remove("open", "wide");
  listEl.innerHTML = "";
  previewEl.innerHTML = "";
  hintEl.textContent = "";
}

function move(step) {
  if (!results.length) return;
  selected = (selected + step + results.length) % results.length;
  render();
}

function openSelected() {
  const result = results[selected];
  if (!result) return;
  if (window.pywebview) window.pywebview.api.open_url(result.url);
  else window.open(result.url, "_blank", "noopener");
}

function render() {
  panel.classList.add("open");
  panel.classList.toggle("wide", results.length > 0);

  if (!results.length) {
    listEl.innerHTML = '<div id="empty">No results</div>';
    previewEl.innerHTML = "";
    hintEl.textContent = "";
    return;
  }

  hintEl.textContent = trimHost(results[selected].host);

  const rows = results.map((result, index) => {
    const section =
      index === 0 ? '<div class="section">Top Hit</div>'
      : index === 1 ? '<div class="section">Web Pages</div>' : "";
    return `${section}
      <div class="row ${index === selected ? "selected" : ""}" data-index="${index}">
        <span class="badge" style="background:${badgeColor(result.host)}">
          ${escapeHtml(monogram(result.host))}</span>
        <span class="texts">
          <div class="title">${escapeHtml(result.title)}</div>
          <div class="host">${escapeHtml(trimHost(result.host))}</div>
        </span>
      </div>`;
  }).join("");
  listEl.innerHTML = rows;

  for (const row of listEl.querySelectorAll(".row")) {
    row.addEventListener("mousemove", () => {
      const index = Number(row.dataset.index);
      if (index !== selected) { selected = index; render(); }
    });
    row.addEventListener("click", openSelected);
  }

  const active = listEl.querySelector(".row.selected");
  if (active) active.scrollIntoView({ block: "nearest" });

  renderPreview(results[selected]);
}

function renderPreview(result) {
  const related = suggestions.slice(0, 4).map((text) =>
    `<button data-q="${escapeHtml(text)}">${escapeHtml(text)} ↗</button>`).join("");

  previewEl.innerHTML = `
    <div class="badge" style="background:${badgeColor(result.host)}">
      ${escapeHtml(monogram(result.host))}</div>
    <h2>${escapeHtml(result.title)}</h2>
    <div class="url">${escapeHtml(result.url)}</div>
    <div class="snippet">${highlight(result.snippet, result.highlights)}</div>
    <div class="scoregrid">
      <span class="label">BM25</span>
      <span class="track"><span class="fill bm25" style="width:${pct(result.bm25_score)}"></span></span>
      <span class="value">${result.bm25_score.toFixed(2)}</span>
      <span class="label">Semantic</span>
      <span class="track"><span class="fill sem" style="width:${pct(result.semantic_score)}"></span></span>
      <span class="value">${result.semantic_score.toFixed(2)}</span>
      <span class="label">Proximity</span>
      <span class="track"><span class="fill prox" style="width:${pct(result.proximity_score)}"></span></span>
      <span class="value">${result.proximity_score.toFixed(2)}</span>
    </div>
    <div class="chips">${result.matched_terms.slice(0, 8)
      .map((term) => `<span class="chip">${escapeHtml(term)}</span>`).join("")}</div>
    ${related ? `<div class="section" style="padding-left:0">Related</div>
                 <div class="related">${related}</div>` : ""}`;

  for (const button of previewEl.querySelectorAll(".related button")) {
    button.addEventListener("click", () => {
      input.value = button.dataset.q;
      runSearch();
      input.focus();
    });
  }
}

function highlight(snippet, highlights) {
  let html = "";
  let cursor = 0;
  for (const [start, end] of highlights) {
    if (start < cursor || start >= snippet.length) continue;
    html += escapeHtml(snippet.slice(cursor, start));
    html += "<mark>" + escapeHtml(snippet.slice(start, end)) + "</mark>";
    cursor = end;
  }
  return html + escapeHtml(snippet.slice(cursor));
}

function trimHost(host) { return host.replace(/^www\./, ""); }

function monogram(host) {
  const name = trimHost(host);
  return (name[0] || "?").toUpperCase();
}

function badgeColor(host) {
  let hash = 0;
  for (const char of host) hash = (hash * 31 + char.charCodeAt(0)) >>> 0;
  const hue = hash % 360;
  return `linear-gradient(160deg, hsl(${hue} 70% 58%), hsl(${(hue + 40) % 360} 70% 42%))`;
}

function pct(value) { return Math.round(Math.max(0, Math.min(1, value)) * 100) + "%"; }

function escapeHtml(text) {
  return String(text).replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
</script>
</body>
</html>
