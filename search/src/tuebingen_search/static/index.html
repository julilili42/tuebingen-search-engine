<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tübingen Search</title>
<style>
  :root {
    --bg: #0f1115; --panel: #181b22; --border: #2a2f3a;
    --text: #e8eaf0; --muted: #9aa3b2; --accent: #ffb454; --accent2: #59c2ff;
    --mark: #3b2f17;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.55 -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    padding: 18px 24px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 2;
  }
  h1 { font-size: 20px; margin: 0; white-space: nowrap; }
  h1 span { color: var(--accent); }
  #searchbox { flex: 1; min-width: 260px; display: flex; gap: 8px; }
  #q {
    flex: 1; padding: 10px 14px; font-size: 16px; color: var(--text);
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
  }
  #q:focus { outline: none; border-color: var(--accent2); }
  button {
    padding: 10px 18px; font-size: 15px; border-radius: 10px; cursor: pointer;
    background: var(--accent2); color: #08121a; border: none; font-weight: 600;
  }
  main { display: flex; gap: 28px; max-width: 1200px; margin: 0 auto; padding: 20px 24px; }
  #results { flex: 1; min-width: 0; }
  aside { width: 250px; flex-shrink: 0; }
  .meta { color: var(--muted); font-size: 13px; margin-bottom: 14px; }
  .result {
    padding: 14px 16px; margin-bottom: 12px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 12px;
  }
  .result .host { color: var(--muted); font-size: 12px; }
  .result a.title {
    color: var(--accent2); font-size: 17px; text-decoration: none; font-weight: 600;
  }
  .result a.title:hover { text-decoration: underline; }
  .snippet { margin: 6px 0; color: var(--text); }
  mark { background: var(--mark); color: var(--accent); border-radius: 3px; padding: 0 2px; }
  .why {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-top: 8px; font-size: 12px; color: var(--muted);
  }
  .bar {
    width: 130px; height: 8px; border-radius: 4px; overflow: hidden;
    background: #242936; display: inline-flex;
  }
  .bar .bm25 { background: var(--accent2); height: 100%; }
  .bar .sem { background: var(--accent); height: 100%; }
  .chip {
    background: #232838; border: 1px solid var(--border); border-radius: 999px;
    padding: 1px 9px; font-size: 12px; color: var(--text);
  }
  aside h3 { font-size: 13px; text-transform: uppercase; letter-spacing: .06em;
             color: var(--muted); margin: 18px 0 8px; }
  .facet, .suggestion {
    display: flex; justify-content: space-between; gap: 8px; width: 100%;
    background: none; border: none; color: var(--accent2); font-size: 14px;
    padding: 4px 0; cursor: pointer; text-align: left;
  }
  .facet.active { color: var(--accent); font-weight: 700; }
  .facet .count { color: var(--muted); }
  .legend { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .legend i { display: inline-block; width: 10px; height: 10px; border-radius: 2px;
              margin-right: 4px; }
  #empty { color: var(--muted); padding: 40px 0; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>Tübingen <span>Search</span></h1>
  <form id="searchbox">
    <input id="q" type="search" placeholder="e.g. tübingen attractions …" autofocus>
    <button type="submit">Search</button>
  </form>
</header>

<main>
  <section id="results"><div id="empty">Search English web content about Tübingen.</div></section>
  <aside id="sidebar" hidden>
    <h3>Sites</h3>
    <div id="facets"></div>
    <h3>Related searches</h3>
    <div id="suggestions"></div>
    <h3>Score legend</h3>
    <div class="legend">
      <div><i style="background:var(--accent2)"></i>BM25 (keyword match)</div>
      <div><i style="background:var(--accent)"></i>Semantic (LSA similarity)</div>
    </div>
  </aside>
</main>

<script>
const form = document.getElementById("searchbox");
const input = document.getElementById("q");
const resultsEl = document.getElementById("results");
const sidebar = document.getElementById("sidebar");
const facetsEl = document.getElementById("facets");
const suggestionsEl = document.getElementById("suggestions");

let activeHost = null;
let lastQuery = "";

form.addEventListener("submit", (event) => {
  event.preventDefault();
  activeHost = null;
  runSearch();
});

async function runSearch() {
  const query = input.value.trim();
  if (!query) return;
  lastQuery = query;

  const params = new URLSearchParams({ q: query });
  if (activeHost) params.set("host", activeHost);

  resultsEl.innerHTML = '<div id="empty">Searching…</div>';
  const response = await fetch("/api/search?" + params);
  if (!response.ok) {
    resultsEl.innerHTML = '<div id="empty">Search failed.</div>';
    return;
  }
  render(await response.json());
}

function render(data) {
  sidebar.hidden = false;
  renderFacets(data.facets);
  renderSuggestions(data.suggestions);

  if (!data.results.length) {
    resultsEl.innerHTML = '<div id="empty">No results.</div>';
    return;
  }

  const meta = `<div class="meta">${data.total_matches} documents matched` +
    (data.expansion_terms.length
      ? ` · query expanded with <em>${data.expansion_terms.slice(0, 6).map(escapeHtml).join(", ")}</em>`
      : "") + `</div>`;

  resultsEl.innerHTML = meta + data.results.map(renderResult).join("");
}

function renderResult(result) {
  const semanticShare = result.score > 0
    ? (0.25 * result.semantic_score) / (0.75 * result.bm25_score + 0.25 * result.semantic_score || 1)
    : 0;
  const bmWidth = Math.round((1 - semanticShare) * 100);
  const chips = result.matched_terms.slice(0, 8)
    .map((term) => `<span class="chip">${escapeHtml(term)}</span>`).join(" ");

  return `<article class="result">
    <div class="host">${escapeHtml(result.host)}</div>
    <a class="title" href="${encodeURI(result.url)}" target="_blank" rel="noopener">
      ${escapeHtml(result.title)}</a>
    <div class="snippet">${highlight(result.snippet, result.highlights)}</div>
    <div class="why">
      <span>#${result.rank} · score ${result.score.toFixed(3)}</span>
      <span class="bar" title="BM25 vs. semantic contribution">
        <span class="bm25" style="width:${bmWidth}%"></span>
        <span class="sem" style="width:${100 - bmWidth}%"></span>
      </span>
      ${chips}
    </div>
  </article>`;
}

function highlight(snippet, highlights) {
  let html = "";
  let cursor = 0;
  for (const [start, end] of highlights) {
    if (start < cursor || start >= snippet.length) continue;
    html += escapeHtml(snippet.slice(cursor, start));
    html += "<mark>" + escapeHtml(snippet.slice(start, end)) + "</mark>";
    cursor = end;
  }
  return html + escapeHtml(snippet.slice(cursor));
}

function renderFacets(facets) {
  facetsEl.innerHTML = facets.map(([host, count]) =>
    `<button class="facet ${host === activeHost ? "active" : ""}" data-host="${escapeHtml(host)}">
       <span>${escapeHtml(host)}</span><span class="count">${count}</span>
     </button>`).join("");

  for (const button of facetsEl.querySelectorAll(".facet")) {
    button.addEventListener("click", () => {
      activeHost = activeHost === button.dataset.host ? null : button.dataset.host;
      runSearch();
    });
  }
}

function renderSuggestions(suggestions) {
  suggestionsEl.innerHTML = suggestions.map((text) =>
    `<button class="suggestion">${escapeHtml(text)}</button>`).join("");
  for (const button of suggestionsEl.querySelectorAll(".suggestion")) {
    button.addEventListener("click", () => {
      input.value = button.textContent.trim();
      activeHost = null;
      runSearch();
    });
  }
}

function escapeHtml(text) {
  return String(text).replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
</script>
</body>
</html>
