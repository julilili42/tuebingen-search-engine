<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tuebingen Labeling</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Tuebingen Labeling</h1>
          <p class="muted">Relevance labels for crawler and search training data</p>
        </div>
        <div class="stats" id="stats"></div>
      </header>

      <section class="search-panel">
        <label class="query-label" for="search-query">Query</label>
        <div class="search-row">
          <input id="search-query" value="Tübingen tourism english" autofocus />
          <button id="search" type="button">Search</button>
          <a class="export" href="/api/export/serp-labels.jsonl">Export JSONL</a>
        </div>
      </section>

      <section class="search-panel">
        <label class="query-label" for="crawler-csv-path">Candidate JSONL</label>
        <div class="search-row">
          <select id="candidate-mode">
            <option value="pages">Pages</option>
            <option value="links" selected>Links</option>
          </select>
          <input id="crawler-csv-path" value="data/link_candidates.jsonl" />
          <input id="crawler-limit" class="small-input" type="number" min="1" max="2000" value="200" />
          <label class="check-label">
            <input id="crawler-unlabeled-only" type="checkbox" checked />
            <span>Unlabeled</span>
          </label>
          <button id="import-crawler" type="button">Import</button>
          <button id="load-crawler" type="button">Load candidates</button>
          <a class="export" href="/api/export/link-labels.jsonl">Export link labels</a>
        </div>
      </section>

      <p class="status" id="status" role="status"></p>
      <section class="deck" id="items"></section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
